name: Android CI (Fast Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Arm64 Only
        run: |
          chmod +x gradlew
          # 移除了引起报错的废弃参数，并使用 -P 指定目标架构以加速构建
          ./gradlew :app:assembleAppRelease \
            -Pandroid.injected.abi.list=arm64-v8a \
            -Pandroid.kotlin.compiler.incremental=true

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoJs6-arm64-v8a
          # 仅上传 arm64 架构，确保 2021 年后的手机流畅运行
          path: app/build/outputs/apk/app/release/*-arm64-v8a.apk