name: Android CI (Fast Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Arm64 Only
        run: |
          chmod +x gradlew
          # 1. 强制清理缓存以避免上一次失败的影响
          # 2. 禁用增量编译以绕过 D8 的 Kotlin 元数据重写错误
          # 3. 限制只构建 arm64
          ./gradlew :app:assembleAppRelease \
            -Pandroid.injected.abi.list=arm64-v8a \
            -Pkotlin.incremental=false \
            -Pandroid.kotlin.compiler.incremental=false \
            --no-daemon \
            --stacktrace

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoJs6-arm64-v8a
          # 仅上传 arm64 架构，确保 2021 年后的手机流畅运行
          path: app/build/outputs/apk/app/release/*-arm64-v8a.apk