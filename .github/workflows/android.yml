name: Android CI (Fast Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Arm64 Only
        # 仅构建 arm64-v8a 版本的 APK，节省大量链接和压缩时间
        run: |
          chmod +x gradlew
          ./gradlew assembleInrtRelease assembleAppRelease -Pandroid.bundle.enableUncompressedNativeLibs=false

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoJs6-arm64-v8a
          # 仅上传 arm64 架构，确保 2021 年后的手机流畅运行
          path: app/build/outputs/apk/app/release/*-arm64-v8a.apk